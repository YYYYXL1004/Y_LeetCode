<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝桥杯 5 天冲刺 40 分作战台</title>
    <style>
        :root {
            --bg: #f8f2ea;
            --bg-soft: #fffaf4;
            --panel: rgba(255, 250, 244, 0.9);
            --panel-strong: #fffdf9;
            --ink: #1f2937;
            --muted: #6b7280;
            --border: rgba(166, 113, 74, 0.18);
            --accent: #c65d2e;
            --accent-strong: #9f3f15;
            --accent-soft: #fde8dc;
            --accent-warm: #f1b48c;
            --success: #2f855a;
            --success-soft: #e6f6ed;
            --warning: #b7791f;
            --warning-soft: #fff6df;
            --risk: #7a8797;
            --risk-soft: #edf2f7;
            --shadow: 0 18px 45px rgba(112, 61, 32, 0.12);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(245, 180, 115, 0.22), transparent 32%),
                radial-gradient(circle at top right, rgba(198, 93, 46, 0.14), transparent 28%),
                linear-gradient(180deg, #fff6ec 0%, #f8f2ea 48%, #f4ece2 100%);
            padding: 24px;
        }

        a {
            color: inherit;
        }

        .page {
            max-width: 1480px;
            margin: 0 auto;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg);
            padding: 34px;
            background:
                linear-gradient(135deg, rgba(255, 248, 240, 0.97), rgba(255, 255, 255, 0.84)),
                linear-gradient(120deg, rgba(198, 93, 46, 0.08), rgba(255, 255, 255, 0));
            box-shadow: var(--shadow);
            border: 1px solid rgba(198, 93, 46, 0.14);
            margin-bottom: 24px;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: auto -40px -80px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(198, 93, 46, 0.18), rgba(198, 93, 46, 0));
            pointer-events: none;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(198, 93, 46, 0.12);
            color: var(--accent-strong);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.82rem;
            margin-bottom: 18px;
        }

        .hero-top {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .hero-copy {
            max-width: 900px;
        }

        .hero-copy h1 {
            font-size: clamp(2.1rem, 4vw, 3.6rem);
            line-height: 1.08;
            margin-bottom: 12px;
        }

        .hero-copy p {
            max-width: 820px;
            color: var(--muted);
            line-height: 1.75;
            font-size: 1rem;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            border: 0;
            border-radius: 999px;
            padding: 11px 18px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(112, 61, 32, 0.16);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--accent), #d97745);
            color: white;
        }

        .btn.secondary {
            background: #fff;
            color: var(--ink);
            border: 1px solid var(--border);
        }

        .btn.ghost {
            background: rgba(255, 255, 255, 0.6);
            color: var(--ink);
            border: 1px dashed rgba(198, 93, 46, 0.3);
        }

        .warning-banner {
            display: none;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: var(--warning-soft);
            color: #8a5a15;
            font-size: 0.92rem;
            border: 1px solid rgba(183, 121, 31, 0.18);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--panel-strong);
            border-radius: 22px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-meta {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .stat-card.highlight {
            background: linear-gradient(135deg, #c65d2e, #a9481b);
            color: #fff;
            border: 0;
        }

        .stat-card.highlight .stat-label,
        .stat-card.highlight .stat-meta {
            color: rgba(255,255,255,0.82);
        }

        .progress-shell {
            background: rgba(255,255,255,0.78);
            border: 1px solid rgba(198, 93, 46, 0.12);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 20px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .progress-bar {
            position: relative;
            height: 14px;
            background: rgba(166, 113, 74, 0.12);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #ed9b62);
            transition: width 0.25s ease;
        }

        .principles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .principle-chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.72);
            border: 1px solid rgba(198, 93, 46, 0.12);
            color: var(--ink);
            font-size: 0.92rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.76);
            color: var(--ink);
            padding: 12px 18px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), #d97745);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(198, 93, 46, 0.22);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .panel {
            background: var(--panel);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
            padding: 26px;
            margin-bottom: 22px;
            backdrop-filter: blur(10px);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-head h2 {
            font-size: 1.55rem;
            margin-bottom: 6px;
        }

        .section-head p {
            color: var(--muted);
            line-height: 1.6;
        }

        .route-grid,
        .overview-grid,
        .strategy-grid,
        .checklist-grid,
        .year-grid {
            display: grid;
            gap: 16px;
        }

        .route-grid {
            grid-template-columns: repeat(5, minmax(0, 1fr));
        }

        .route-card,
        .overview-card,
        .strategy-card,
        .checklist-card,
        .year-card,
        .day-card {
            background: rgba(255,255,255,0.84);
            border-radius: 22px;
            border: 1px solid rgba(166, 113, 74, 0.14);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.74);
        }

        .route-card,
        .overview-card,
        .strategy-card,
        .checklist-card,
        .year-card {
            padding: 18px;
        }

        .route-card h3,
        .overview-card h3,
        .strategy-card h3,
        .checklist-card h3,
        .year-card h3,
        .day-title {
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .route-card p,
        .overview-card p,
        .strategy-card p,
        .checklist-card p,
        .year-card p {
            color: var(--muted);
            line-height: 1.68;
            font-size: 0.95rem;
        }

        .route-badge,
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .overview-grid {
            grid-template-columns: 1.2fr 1fr 1fr;
        }

        .roi-columns {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .roi-column {
            border-radius: 18px;
            padding: 16px;
            min-height: 100%;
        }

        .roi-column h4 {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .roi-column ul,
        .strategy-card ul,
        .checklist-card ul,
        .day-body ul,
        .meta-list {
            list-style: none;
            display: grid;
            gap: 9px;
        }

        .roi-column li,
        .strategy-card li,
        .checklist-card li,
        .day-body li,
        .meta-list li {
            color: var(--ink);
            line-height: 1.6;
            position: relative;
            padding-left: 14px;
        }

        .roi-column li::before,
        .strategy-card li::before,
        .checklist-card li::before,
        .day-body li::before,
        .meta-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.7em;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.35;
        }

        .roi-column.stable {
            background: linear-gradient(180deg, rgba(47,133,90,0.12), rgba(255,255,255,0.9));
            color: #23603f;
        }

        .roi-column.high {
            background: linear-gradient(180deg, rgba(198,93,46,0.12), rgba(255,255,255,0.9));
            color: #8f441c;
        }

        .roi-column.risk {
            background: linear-gradient(180deg, rgba(122,135,151,0.14), rgba(255,255,255,0.9));
            color: #52606d;
        }

        .chip-list,
        .problem-grid,
        .task-grid,
        .time-grid,
        .link-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 9px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(166,113,74,0.16);
            font-size: 0.9rem;
            color: var(--ink);
        }

        .chip.soft {
            background: var(--accent-soft);
            color: var(--accent-strong);
            border-color: transparent;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle-pill {
            border-radius: 999px;
            border: 1px solid var(--border);
            padding: 10px 14px;
            background: rgba(255,255,255,0.78);
            cursor: pointer;
            font-weight: 700;
            color: var(--ink);
        }

        .toggle-pill.active {
            background: var(--accent-soft);
            color: var(--accent-strong);
            border-color: rgba(198,93,46,0.28);
        }

        .day-stack {
            display: grid;
            gap: 16px;
        }

        .day-card {
            overflow: hidden;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding: 22px 24px;
            cursor: pointer;
        }

        .day-header:hover {
            background: rgba(255,255,255,0.45);
        }

        .day-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-kicker {
            color: var(--accent-strong);
            font-weight: 800;
            font-size: 0.88rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .day-subtitle {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .day-progress {
            display: flex;
            gap: 14px;
            align-items: center;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .mini-progress {
            width: 150px;
            height: 10px;
            background: rgba(166,113,74,0.14);
            border-radius: 999px;
            overflow: hidden;
        }

        .mini-progress > span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ed9b62);
            border-radius: inherit;
        }

        .collapse-btn {
            border: 0;
            background: rgba(198,93,46,0.1);
            color: var(--accent-strong);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
        }

        .day-body {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 18px;
            padding: 0 24px 24px;
        }

        .day-col {
            display: grid;
            gap: 16px;
        }

        .sub-card {
            background: rgba(255,255,255,0.74);
            border: 1px solid rgba(166,113,74,0.12);
            border-radius: 18px;
            padding: 16px;
        }

        .sub-card h4 {
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .problem-card,
        .task-card,
        .link-card {
            border-radius: 14px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.92);
            border: 1px solid rgba(166,113,74,0.14);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .problem-card:hover,
        .task-card:hover,
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(112, 61, 32, 0.10);
            border-color: rgba(198,93,46,0.28);
        }

        .problem-card.done,
        .task-card.done {
            background: var(--success-soft);
            border-color: rgba(47,133,90,0.24);
        }

        .problem-card.optional {
            background: rgba(122,135,151,0.08);
        }

        .problem-card.high-roi {
            background: linear-gradient(135deg, rgba(198,93,46,0.12), rgba(255,255,255,0.94));
        }

        .problem-title,
        .task-title,
        .link-card strong {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .problem-meta,
        .task-meta,
        .link-card span {
            color: var(--muted);
            font-size: 0.86rem;
            line-height: 1.55;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .time-card {
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(166,113,74,0.14);
        }

        .time-card strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .empty-state {
            padding: 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.68);
            border: 1px dashed rgba(166,113,74,0.24);
            color: var(--muted);
            text-align: center;
        }

        .strategy-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .checklist-grid {
            grid-template-columns: 1.1fr 1fr;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .link-card {
            text-decoration: none;
            color: inherit;
        }

        .toast {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 20;
            min-width: 220px;
            max-width: 360px;
            padding: 14px 18px;
            border-radius: 16px;
            color: #fff;
            background: rgba(31,41,55,0.92);
            box-shadow: 0 16px 32px rgba(0,0,0,0.18);
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
            transition: all 0.22s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success { background: rgba(47,133,90,0.94); }
        .toast.warning { background: rgba(183,121,31,0.95); }
        .toast.error { background: rgba(159,63,21,0.96); }

        @media (max-width: 1200px) {
            .stats-grid,
            .route-grid,
            .overview-grid,
            .strategy-grid,
            .checklist-grid,
            .day-body,
            .time-grid,
            .link-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            body { padding: 16px; }
            .hero { padding: 24px; }
            .hero-top,
            .section-head,
            .day-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats-grid,
            .route-grid,
            .overview-grid,
            .strategy-grid,
            .checklist-grid,
            .day-body,
            .time-grid,
            .link-grid,
            .roi-columns {
                grid-template-columns: 1fr;
            }
            .day-progress {
                width: 100%;
                justify-content: space-between;
            }
            .mini-progress { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="hero">
            <div class="eyebrow">LanQiao Sprint Dashboard</div>
            <div class="hero-top">
                <div class="hero-copy">
                    <h1>蓝桥杯 5 天冲刺 40 分作战台</h1>
                    <p>目标不是临时补高难模型，而是把“会过的常规题”压成比赛里的稳定得分。这个页面把原方案拆成可看的总览、可打卡的每日执行、可复习的赛场策略和考前清单。</p>
                </div>
                <div class="hero-actions">
                    <button class="btn primary" type="button" onclick="exportProgress()">导出进度</button>
                    <button class="btn secondary" type="button" onclick="triggerImport()">导入进度</button>
                    <button class="btn secondary" type="button" onclick="resetProgress()">重置进度</button>
                    <button class="btn ghost" type="button" onclick="switchTab('daily')">进入今日执行</button>
                </div>
            </div>
            <div class="warning-banner" id="storageWarning"></div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="progress-shell">
                <div class="progress-meta">
                    <span id="progressSummary">总体完成度</span>
                    <span id="progressDetail">0 / 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="principles" id="principles"></div>
        </header>

        <div class="tabs" id="tabNav"></div>

        <section class="tab-panel active" id="panel-overview"></section>
        <section class="tab-panel" id="panel-daily"></section>
        <section class="tab-panel" id="panel-strategy"></section>
        <section class="tab-panel" id="panel-checklist"></section>
    </div>

    <input type="file" id="importFile" accept="application/json" style="display:none">
    <div class="toast" id="toast"></div>

    <script>
        const storageKeys = {
            problems: 'lanqiaoSprintProblemStatus',
            tasks: 'lanqiaoSprintTaskStatus',
            activeTab: 'lanqiaoSprintActiveTab'
        };

        const dashboardMeta = {
            title: '蓝桥杯 5 天冲刺 40 分作战台',
            subtitle: '真题主线 + 专题补洞 + 赛场止损 + 部分分意识',
            targetScore: '40 分左右',
            period: 'Day 1 - Day 5',
            principles: ['先扫题分层，再做高 ROI', '真题优先，LeetCode 只负责补洞', '超过 25-30 分钟无核心思路就止损', 'Day 4 只重做，Day 5 只模拟']
        };

        const overviewData = {
            attackTypes: ['枚举', '模拟', '字符串处理', '日期与规则判断', '筛法 / 质数 / 位运算', '排序 / 前后缀 / 简单贪心', '简单 DFS / 回溯 / 棋盘搜索', '线性 DP', '二维 DP', '按位贡献 / 基础计数'],
            postponeTopics: ['LCA', '树上差分', '线段树', 'Kruskal 重构树', 'DSU on tree', 'Möbius 反演', '基环树 + 树形 DP'],
            patchRules: ['20-30 分钟都识别不出核心模型，再切专题补 2-5 题', '看完题解还不能独立重写，说明要补模型不是补运气', '如果只是实现挂了、边界乱了、读题慢了，优先重写原题，不要逃去刷新题'],

        function testStorageAccess() {
            try {
                const key = '__lanqiao_storage_probe__';
                localStorage.setItem(key, '1');
                localStorage.removeItem(key);
                return true;
            } catch (error) {
                return false;
            }
        }

        function loadJson(key, fallback) {
            if (!storageAvailable) return fallback;
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function saveJson(key, value) {
            if (!storageAvailable) return;
            localStorage.setItem(key, JSON.stringify(value));
        }

        function persistState() {
            saveJson(storageKeys.problems, problemStatus);
            saveJson(storageKeys.tasks, taskStatus);
            if (storageAvailable) {
                localStorage.setItem(storageKeys.activeTab, activeTab);
            }
        }

        function getAllProblems() {
            const map = new Map();
            for (const plan of dayPlans) {
                for (const group of plan.problemGroups) {
                    for (const item of group.items) {
                        if (!map.has(item.id)) map.set(item.id, item);
                    }
                }
            }
            return Array.from(map.values());
        }

        function getAllTasks() {
            return dayPlans.flatMap(plan => plan.tasks);
        }

        function countCompleted(ids, statusStore) {
            return ids.filter(id => Boolean(statusStore[id])).length;
        }

        function getOverallStats() {
            const problems = getAllProblems();
            const tasks = getAllTasks();
            const problemIds = problems.map(item => item.id);
            const taskIds = tasks.map(item => item.id);
            const highRoiIds = overviewData.highRoiProblems.map(item => item.id);
            const completedProblems = countCompleted(problemIds, problemStatus);
            const completedTasks = countCompleted(taskIds, taskStatus);
            const completedHighRoi = countCompleted(highRoiIds, problemStatus);
            const total = problemIds.length + taskIds.length;
            const completed = completedProblems + completedTasks;
            const percent = total ? Math.round(completed / total * 100) : 0;
            return {
                problemIds,
                taskIds,
                completedProblems,
                completedTasks,
                completedHighRoi,
                totalProblems: problemIds.length,
                totalTasks: taskIds.length,
                total,
                completed,
                percent
            };
        }

        function getDayProgress(plan) {
            const problemIds = [...new Set(plan.problemGroups.flatMap(group => group.items.map(item => item.id)))];
            const taskIds = plan.tasks.map(task => task.id);
            const total = problemIds.length + taskIds.length;
            const completed = countCompleted(problemIds, problemStatus) + countCompleted(taskIds, taskStatus);
            const percent = total ? Math.round(completed / total * 100) : 0;
            return { completed, total, percent };
        }

        function getProblemCardClasses(item) {
            const classes = ['problem-card'];
            if (problemStatus[item.id]) classes.push('done');
            if (item.classes) classes.push(...item.classes);
            return classes.join(' ');
        }

        function exportProgress() {
            const payload = {
                version: 1,
                exportedAt: new Date().toISOString(),
                activeTab,
                problemStatus,
                taskStatus,
                stats: getOverallStats()
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = `蓝桥杯5天冲刺进度_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
            anchor.click();
            URL.revokeObjectURL(url);
            showToast('进度已导出', 'success');
        }

        function resetProgress() {
            if (!confirm('确定要清空所有题目和任务进度吗？此操作不可撤销。')) return;
            problemStatus = {};
            taskStatus = {};
            persistState();
            renderAll();
            showToast('进度已重置', 'warning');
        }

        function handleImport(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ({ target }) => {
                try {
                    const payload = JSON.parse(target.result);
                    if (!payload || typeof payload !== 'object' || !payload.problemStatus || !payload.taskStatus) {
                        throw new Error('文件缺少 problemStatus 或 taskStatus');
                    }

                    const validProblemIds = new Set(getAllProblems().map(item => item.id));
                    const validTaskIds = new Set(getAllTasks().map(item => item.id));
                    const importedProblems = {};
                    const importedTasks = {};

                    for (const [id, value] of Object.entries(payload.problemStatus)) {
                        if (validProblemIds.has(id)) importedProblems[id] = Boolean(value);
                    }
                    for (const [id, value] of Object.entries(payload.taskStatus)) {
                        if (validTaskIds.has(id)) importedTasks[id] = Boolean(value);
                    }

                    problemStatus = importedProblems;
                    taskStatus = importedTasks;
                    if (['overview', 'daily', 'strategy', 'checklist'].includes(payload.activeTab)) {
                        activeTab = payload.activeTab;
                    }
                    persistState();
                    renderAll();
                    showToast('进度已导入', 'success');
                } catch (error) {
                    showToast(`导入失败：${error.message}`, 'error');
                }
            };
            reader.readAsText(file, 'utf8');
            event.target.value = '';
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => {
                toast.className = 'toast';
            }, 2200);
        }

        function init() {
            storageAvailable = testStorageAccess();
            if (!storageAvailable) {
                const warning = document.getElementById('storageWarning');
                warning.style.display = 'block';
                warning.textContent = '当前环境无法使用 localStorage：页面仍可浏览，但进度不会自动持久保存。';
            }

            problemStatus = loadJson(storageKeys.problems, {});
            taskStatus = loadJson(storageKeys.tasks, {});
            if (storageAvailable) {
                const cachedTab = localStorage.getItem(storageKeys.activeTab);
                if (['overview', 'daily', 'strategy', 'checklist'].includes(cachedTab)) {
                    activeTab = cachedTab;
                }
            }

            document.getElementById('importFile').addEventListener('change', handleImport);
            renderAll();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
